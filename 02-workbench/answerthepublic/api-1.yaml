openapi: 3.0.1
info:
  title: AnswerThePublic Public API
  description: |-
    The AnswerThePublic Public API lets you run keyword research programmatically
    and pull the same data the in-app dashboard shows — questions, prepositions,
    comparisons, and alphabeticals — across the providers AnswerThePublic
    supports (Google Web, YouTube, Bing, Amazon, TikTok, Instagram, ChatGPT,
    Gemini).

    Use it to integrate keyword discovery into your own tooling: content
    pipelines, dashboards, briefs, internal portals, or automated workflows.
    Searches you create through the API are stored in your workspace exactly
    like searches run from the UI, so the two surfaces stay in sync.

    Two resources do most of the work: **searches** (the keyword queries
    you create — they cost credits) and **reports** (the structured output
    of a completed search — read-only and free to fetch). Each is
    explained in detail in its own section below.

    ## Quick start
    1. Open **Account → API Access** in your AnswerThePublic dashboard and
       enable API access for the workspace.
    2. Create a Personal Access Token, choose its scopes (see below), and copy
       the token — it is only shown once.
    3. Call `GET /api/public/v1/me` with the token in the `Authorization`
       header to confirm the workspace and scopes.
    4. Create your first search with `POST /api/public/v1/searches`.

    ## Authentication
    Every endpoint requires a Personal Access Token issued from the
    AnswerThePublic account settings. Tokens are prefixed with
    `atp_pk_live_` and are sent as a Bearer token in the `Authorization`
    header:

    ```
    Authorization: Bearer atp_pk_live_<your-token>
    ```

    Tokens are tied to a single user **and** a single workspace, and they
    inherit that user's role and that workspace's plan. Treat them like
    passwords — never check them into source control or share them between
    workspaces. You can revoke a token at any time from the same settings
    page; revocation takes effect immediately.

    ## Scopes
    Scopes are chosen when the token is created and cannot be changed later.
    A request that uses a scope the token does not hold returns `403 Forbidden`
    with a message naming the missing scope.

    | Scope             | Grants                                                                      |
    |-------------------|-----------------------------------------------------------------------------|
    | `searches:read`   | List and retrieve searches and their snapshots                              |
    | `searches:write`  | Create new searches (consumes plan credits)                                 |
    | `reports:read`    | Retrieve report payloads — keywords, volumes, intents, sentiments, sources  |
    | `ai:read`         | List AI prompts on ChatGPT/Gemini reports (first call per report generates them and consumes plan credits) and poll generated AI answers |
    | `ai:write`        | Request AI answer generation (consumes plan credits)                        |

    Pick the **minimum** set of scopes a given integration needs. A read-only
    dashboard, for example, never needs `searches:write`.

    ## Workspaces
    AnswerThePublic groups searches, members, and billing under a **workspace**.
    A token is bound to one workspace at creation time, and every endpoint
    operates implicitly on that workspace — you never have to pass a workspace
    ID. To create searches in a different workspace, mint a separate token
    inside that workspace.

    Call `GET /api/public/v1/me` to discover which workspace, plan, and
    scopes the active token resolves to. This is also the cheapest call to
    use as a health check.

    ## Plan eligibility
    The API is part of paid AnswerThePublic plans only. Tokens minted in a
    free workspace return `403 Plan does not support API access` on every
    request.

    The workspace's tier is reported by `GET /me` as `workspace.atp_tier`:

    | `atp_tier`   | Plan                          | What it means                                                                                                  |
    |--------------|-------------------------------|----------------------------------------------------------------------------------------------------------------|
    | `t1`         | Starter / Individual          | Entry-level paid plan. API access is included. Lowest monthly search allowance.                                |
    | `t2`         | Growth / Pro                  | Mid-tier plan with a larger monthly search allowance and more concurrent users per workspace.                  |
    | `t3`         | Business / Expert / Enterprise | Highest-tier plans. Largest search allowances, full provider coverage, and priority for enterprise integrations.|
    | `lifetime`   | Lifetime                      | One-time purchase plan. API access included; allowance scales with the lifetime variant purchased.             |
    | `restart`    | Restart                       | Legacy reactivation plan. Limited API allowance — recommend upgrading for production integrations.             |

    Each `POST /api/public/v1/searches` consumes credits from the workspace's
    monthly allowance, just like a search created from the UI. Hitting the
    allowance returns `403` with a billing-specific message; upgrade the plan
    or wait for the next billing cycle to resume.

    ## Workspace opt-in
    Even with a valid paid plan, a workspace owner must explicitly turn on
    API access from **Account → API Access**. Until then, every request from
    the workspace's tokens returns `403 API access is disabled for this
    workspace`. Toggling the flag off invalidates every token minted for the
    workspace immediately — useful as a kill switch if a token leaks.

    ## Workspace lock
    A workspace can also be temporarily **locked** by AnswerThePublic — for
    example after an overdue invoice, a payment failure, or a billing dispute.
    While the workspace is locked, **every** public-API endpoint returns
    `403 Workspace is locked. Please contact support or complete your
    subscription.` until the lock is cleared. The lock is enforced
    namespace-wide so reads and writes both stop together — there is no
    "read-only locked" state to design around.

    ## Rate limits
    The API allows **60 requests per minute per token** by default. When a
    token exceeds that ceiling, the next request returns `429 Too Many
    Requests` with a `Retry-After` header (in seconds). Back off until the
    header's value elapses, then retry.

    The limit is per token, not per workspace, so splitting workloads across
    several tokens is a fair way to scale read-heavy integrations. For
    sustained higher throughput, contact support to request a per-workspace
    increase.

    ## Errors
    Every error response uses the same shape:

    ```json
    {
      "error": {
        "message": "Human-readable description of what went wrong",
        "code": 401,
        "details": { "missing_scope": "searches:write" }
      }
    }
    ```

    `details` is optional and present only when extra context is useful —
    e.g. naming the missing scope, the failing field, or the field of a
    validation error. Common status codes you should plan for:

    | Status | When you'll see it                                                                                                 |
    |--------|--------------------------------------------------------------------------------------------------------------------|
    | `401`  | The `Authorization` header is missing, malformed, or the token is revoked, expired, or belongs to a deleted user. |
    | `403`  | Token is valid but the request is blocked: missing scope, the workspace plan does not include API access, the workspace opt-in toggle is off, or the workspace is locked. |
    | `404`  | The resource (search, report) does not exist or belongs to a different workspace.                                  |
    | `422`  | The request body failed validation. `error.details` lists the offending fields.                                    |
    | `429`  | Rate limit exceeded. Honour `Retry-After`.                                                                          |
    | `5xx`  | Transient server error. Retry with exponential backoff; if it persists, contact support.                            |

    ## Versioning
    All endpoints are namespaced under `/api/public/v1`. Breaking changes
    will land under a new prefix (`/v2`, etc.); `v1` will be maintained for
    a deprecation window announced in advance. Additive changes — new
    optional fields, new endpoints, new providers — can land in `v1`
    without notice, so build clients that ignore unknown fields.
  version: 1.0.0-alpha
  termsOfService: https://answerthepublic.com/pages/terms-and-conditions
servers:
  - url: https://api.answerthepublic.com
    description: Production (current)
tags:
  - name: Me
    description: |-
      Inspect the user, workspace, plan, and scopes the active token resolves
      to. Useful as a health check, for surfacing the workspace name in your
      own UI, and for confirming a token's scopes before issuing a write call.
  - name: Searches
    description: |-
      A **search** is one keyword query against one provider, scoped to one
      language and one region. For example, `marketing automation` in
      English / United States on Google Web is one search; the same keyword
      on YouTube is a separate search.

      Creating a search via `POST /api/public/v1/searches` actually creates
      a **parent search** that fans out into one search per provider you
      selected (or every provider, if you didn't pick one). Each provider's
      search runs its own asynchronous pipeline — autocomplete suggestions,
      AI prompts where applicable, and cost-per-click enrichment — and
      stores the result as a **snapshot**.

      Searches are the queryable unit: you can list them, filter them by
      provider / language / region, and re-fetch a single one to check
      whether its snapshot is ready. Running the same
      keyword + language + region twice in the workspace inside a 24-hour
      window reuses the existing search instead of consuming credits again.
  - name: Reports
    description: |-
      A **report** is the structured output of a completed search — the
      keyword rows you would see on the AnswerThePublic dashboard,
      complete with monthly search volume, cost-per-click, intent and
      sentiment labels (where the provider supports them), and source
      breakdowns (questions, prepositions, comparisons, alphabeticals,
      related).

      A search produces a report; a report belongs to a search. Reports
      are read-only and free to fetch — call
      `GET /api/public/v1/reports/{id}` as often as you like to slice the
      same data different ways using the query parameters (filter by
      provider, narrow by source bucket or category, sort, range-clip
      volumes, etc.).

      The mental model: **searches cost credits to create; reports cost
      nothing to read.** Run the search once, then surface its report
      everywhere (dashboard, briefs, internal tools) without consuming
      additional allowance.
  - name: AI
    description: |-
      AI endpoints surface the prompts and generated answers tied to
      ChatGPT and Gemini reports. A **prompt** is a question we have
      pre-built or your team has written for a given report; an
      **answer** is the generated text returned by the underlying AI
      provider.

      The flow is split into two phases so you can keep an HTTP request
      cheap while the model runs:

      1. `POST /reports/{id}/ai/answer_request` enqueues a generation job
         and returns a `task_id`. This call consumes plan credits and
         requires `ai:write`.
      2. `POST /reports/{id}/ai/answer` polls the same `task_id` until
         the underlying model finishes. While `status` is `processing`
         the body has no `ai_answer`; once it flips to `completed` the
         answer is inlined. This call is free and uses `ai:read`.

      `POST /reports/{id}/ai/prompts` returns the prompts tied to a
      report. It is `POST` rather than `GET` because the **first** call
      against a report generates the prompts on demand, which consumes
      plan credits the same way a ChatGPT or Gemini search does.
      Subsequent calls return the existing prompts from storage and do
      not charge again. Uses `ai:read`.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Personal access token (atp_pk_live_*)
  schemas:
    Error:
      type: object
      description: |-
        Standard error envelope. Every non-2xx response uses this shape so
        clients can rely on a single error parser.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              description: Human-readable description of what went wrong. Safe to surface to
                end users.
              example: Token is missing the required `searches:write` scope.
            code:
              type: integer
              description: HTTP status code, mirrored here for convenience when the error
                envelope is forwarded across a queue.
              example: 403
            details:
              type: object
              description: >-
                Optional map of structured context — e.g. `{"missing_scope":
                "searches:write"}`

                on a 403, or `{"keyword": ["can't be blank"]}` on a 422. Absent

                when no extra context is useful.
              additionalProperties: true
    Pagination:
      type: object
      description: |-
        Page metadata for list endpoints. Use `next` and `prev` to walk the
        result set without computing offsets yourself; both are `null` at the
        edges.
      properties:
        count:
          type: integer
          example: 42
          description: Total number of records that match the query, across every page.
        page:
          type: integer
          example: 1
          description: 1-indexed page number this response belongs to.
        pages:
          type: integer
          example: 5
          description: Total number of pages available given the current `limit`.
        limit:
          type: integer
          example: 10
          description: Number of records requested per page.
        from:
          type: integer
          example: 1
          description: 1-indexed position of the first record on this page within the full
            result set.
        to:
          type: integer
          example: 10
          description: 1-indexed position of the last record on this page within the full
            result set.
        prev:
          type: integer
          nullable: true
          description: Page number to request to step backwards. `null` on the first page.
        next:
          type: integer
          nullable: true
          example: 2
          description: Page number to request to step forwards. `null` on the last page.
    Search:
      type: object
      description: |-
        A provider-specific keyword search inside a workspace. Each ATP
        keyword query produces one Search per provider — for example a
        single `keyword + language + region` may fan out into separate
        Search rows for `gweb`, `youtube`, `bing`, etc., grouped under one
        `parent_search_id`.
      properties:
        id:
          type: string
          format: uuid
          description: Stable identifier for this provider-specific search. Use it with
            `GET /api/public/v1/searches/{id}`.
        keyword:
          type: string
          example: marketing automation
          description: The query the user entered, normalised (trimmed, case-folded).
        language:
          type: string
          example: en
          description: ISO 639-1 language code used for autocompletes (e.g. `en`, `es`,
            `pt`). Coerced to `en` for Instagram, which is English-only.
        region:
          type: string
          example: us
          description: ISO 3166-1 alpha-2 region code (e.g. `us`, `gb`, `de`). Coerced to
            `us` for TikTok and Instagram, which only honour the global feed.
        provider:
          type: string
          example: gweb
          description: |-
            Source the suggestions came from. One of:
            `gweb` (Google Web), `youtube`, `bing`, `amazon`, `tiktok`,
            `instagram`, `chatgpt`, `gemini`. Defaults to `gweb` when the
            create call omits a provider.
        slug:
          type: string
          description: URL-friendly identifier for the search inside the AnswerThePublic
            dashboard.
        workspace_id:
          type: string
          format: uuid
          description: Workspace that owns this search. Always equal to the token's bound
            workspace.
        parent_search_id:
          type: string
          format: uuid
          nullable: true
          description: Identifier of the parent search that groups every provider-specific
            run for the same `keyword + language + region`.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ParentSearch:
      type: object
      description: |-
        Aggregate row that groups every provider-specific Search produced by
        a single create call. Returned by `POST /api/public/v1/searches` so
        clients can track all providers' progress with one polling target.
      properties:
        parent_search_id:
          type: string
          format: uuid
          description: Identifier you can persist alongside the workspace to dedupe future
            create calls.
        keyword:
          type: string
          description: Normalised keyword shared by every child search.
        language:
          type: string
          description: Language shared by every child search (where the provider supports
            it).
        region:
          type: string
          description: Region shared by every child search (where the provider supports it).
        workspace_id:
          type: string
          format: uuid
          description: Workspace that owns the parent search and all its children.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - pending
            - loading
            - completed
            - failed
          description: >-
            Roll-up status across every child search. Use this single field to

            decide whether to render results or keep polling.


            - `pending` — the parent row exists but no provider snapshots have
            started yet. Rare; usually indicates an immediate failure to
            enqueue.

            - `loading` — at least one provider snapshot is still being filled
            in the background. Poll again shortly.

            - `completed` — every provider snapshot is fully populated and safe
            to read.

            - `failed` — at least one provider snapshot exceeded the configured
            loading window without completing. Inspect the per-provider
            `searches[].status` to see which ones failed.
        searches:
          type: array
          description: One entry per provider that ran for this parent search. Use the
            per-entry `status` to render partial results as providers complete.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Use to fetch this provider's data with `GET
                  /api/public/v1/searches/{id}`.
              provider:
                type: string
                description: Which provider this entry belongs to (`gweb`, `youtube`, `bing`,
                  `amazon`, `tiktok`, `instagram`, `chatgpt`, `gemini`).
              status:
                type: string
                enum:
                  - loading
                  - completed
                  - failed
                description: Status of this provider's snapshot in isolation, independent of the
                  rolled-up `status` above.
              snapshot:
                description: >-
                  Inlined snapshot payload, included only when this provider's

                  status is `completed`. When still `loading` or `failed`, the

                  field is omitted entirely — poll `GET
                  /api/public/v1/searches/{id}`

                  to fetch the full data once it is ready.
                nullable: true
                type: object
    Me:
      type: object
      description: Snapshot of who the token belongs to and which workspace it operates in.
      properties:
        api_version:
          type: string
          example: alpha
          description: |-
            Release stage label for the public API surface — one of
            `alpha`, `beta`, `ga`. While in `alpha`, endpoints and rate
            limits may change without notice. The label is sourced
            server-side from a feature flag so it can be flipped
            (`alpha` → `beta` → `ga`) without a client deploy.
        user:
          type: object
          description: The human who owns the token. Useful for audit trails in your own
            logs.
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              description: Email of the user who minted the token.
            first_name:
              type: string
              nullable: true
            last_name:
              type: string
              nullable: true
            preferred_language:
              type: string
              nullable: true
              description: User's preferred locale for emails and the dashboard UI. Has no
                effect on API responses.
        workspace:
          type: object
          description: The workspace the token is bound to. Every endpoint operates on
            this workspace implicitly.
          properties:
            id:
              type: string
              format: uuid
            slug:
              type: string
              description: URL-friendly workspace identifier — useful for deep-linking back
                into the AnswerThePublic dashboard.
            name:
              type: string
              description: Human-readable workspace name as set in workspace settings.
            atp_tier:
              type: string
              enum:
                - restart
                - lifetime
                - t1
                - t2
                - t3
              description: |-
                Plan tier the workspace currently sits on. Maps to the
                marketing names as follows: `t1` = Starter / Individual,
                `t2` = Growth / Pro, `t3` = Business / Expert / Enterprise,
                `lifetime` = Lifetime, `restart` = Restart (legacy
                reactivation). API access is included on every tier listed
                here; free workspaces have no `atp_tier` and cannot use the
                API at all.
        token:
          type: object
          description: The active token's metadata. The token value itself is never
            returned — store it when you create it.
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              description: Friendly label assigned at creation time, e.g. "CI pipeline" or
                "Reporting dashboard".
            prefix:
              type: string
              example: atp_pk_live_a1b2c3
              description: Non-secret prefix you can show in your own UI to help users
                identify which token is in use.
            scopes:
              type: array
              items:
                type: string
              description: Scopes granted to the token at creation time.
            last_used_at:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of the most recent successful request with this token.
                `null` if it has never been used.
            expires_at:
              type: string
              format: date-time
              nullable: true
              description: Optional hard expiry. `null` means the token is valid until
                revoked.
            created_at:
              type: string
              format: date-time
security:
  - bearerAuth: []
paths:
  /api/public/v1/me:
    get:
      tags:
        - Me
      summary: Retrieve token, user, and workspace context
      description: >-
        Resolves the active bearer token to the user, workspace, and scopes

        it carries. Use this as:


        - A **health check** before issuing more expensive write calls — if
          this returns 200, the token is valid and the workspace is API-eligible.
        - A way to discover the workspace `slug` and `name` so your own UI
          can link back into the AnswerThePublic dashboard.
        - A way to confirm scopes after rotating a token, without trying a
          write call and handling a 403.

        Cheap to call; safe to hit on every cold start.
      responses:
        "200":
          description: Token resolved successfully. Body contains the user, workspace, and
            token metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Me"
        "401":
          description: |-
            The `Authorization` header is missing, malformed, or the token
            has been revoked, expired, or belongs to a deleted user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |-
            The token is valid but the workspace cannot use the API — either
            the plan does not include API access, the workspace owner has
            not enabled API access in settings, or the workspace is locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/searches:
    get:
      tags:
        - Searches
      summary: List parent_searches in the token's workspace
      description: |-
        Returns a paginated list of `parent_search` rows in the token's
        workspace, with each parent's per-provider child searches embedded.
        A `parent_search` groups every provider-specific Search produced by a
        single create call — listing parents instead of flat searches keeps
        every provider for one keyword together in the response.

        Use the query parameters to narrow the result set: filter by
        `language`/`region` to compare across markets, by `provider` to find
        parents that ran a specific provider, or pass `q` to find parents
        whose keyword matches a substring. Pagination metadata in
        `data.pagination` describes the parent_search list — `count` is the
        number of parents, not the number of children.

        **Required scope:** `searches:read`.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 1-indexed page number to retrieve.
        - in: query
          name: per_page
          schema:
            type: integer
            default: 10
          description: Number of `parent_search` rows per page. Larger pages reduce
            round-trips at the cost of a bigger response payload.
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Order parents alphabetically by keyword (`asc` / `desc`). Default
            is most recently updated first.
        - in: query
          name: region
          schema:
            type: string
          description: Restrict to parent_searches run in this region (e.g. `us`, `gb`,
            `de`).
        - in: query
          name: language
          schema:
            type: string
          description: Restrict to parent_searches run in this language (e.g. `en`, `es`,
            `pt`).
        - in: query
          name: provider
          schema:
            type: string
          description: >-
            Restrict to parent_searches that have at least one child search of
            this provider

            (`gweb`, `youtube`, `bing`, `amazon`, `tiktok`, `instagram`,
            `chatgpt`, `gemini`).

            When this filter is applied, each parent's embedded `searches` array
            is also

            narrowed to the matching provider — siblings from other providers
            are not returned.
        - in: query
          name: q
          schema:
            type: string
          description: Prefix-aware full-text filter on the parent_search `keyword` field
            — handy for finding "all parents mentioning automation".
      responses:
        "200":
          description: List retrieved successfully. Empty `parent_searches` array if no
            records match the filters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      parent_searches:
                        type: array
                        items:
                          $ref: "#/components/schemas/ParentSearch"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Token does not carry the `searches:read` scope, or the workspace
            cannot use the API (plan / kill switch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Searches
      summary: Create a new search (consumes credits)
      description: |-
        Runs keyword research against AnswerThePublic's providers and stores
        the result in the workspace. The created `parent_search` groups the
        per-provider Search rows so you can track all of them with one
        identifier.

        **Required scope:** `searches:write`.

        ## Cost
        Each call consumes credits from the workspace's monthly allowance —
        the same way a search created from the UI does. Hitting the
        allowance returns `403`; upgrade the plan or wait for the next
        billing cycle to resume creating searches. Reads
        (`GET /searches`, `GET /searches/{id}`, `GET /reports/{id}`) are
        always free.

        ## Dedupe window
        If a `parent_search` with the same `keyword + language + region`
        was created in the workspace in the last 24 hours, it is **reused**
        and **no additional credits are charged**. The response will return
        the existing parent's id so your client can continue using the same
        identifier idempotently.

        ## Async response — poll for completion
        Keyword data is gathered in the background by per-provider jobs, so
        the endpoint always returns `201` immediately. The response body
        carries:

        - `status`: rolled-up status across providers (`pending` /
          `loading` / `completed` / `failed`)
        - `searches[]`: one entry per provider with its own `status` and an
          inlined `snapshot` *only* when that provider has already finished
          (e.g. a 24h dedupe hit reusing fully-populated data)

        Poll `GET /api/public/v1/searches/{id}` per provider until its
        `status` reaches `completed`, then read its snapshot. This pattern
        never ties up an HTTP connection while jobs run, which matters
        because a single search can take a long time across the slowest
        providers + CPC enrichment.

        ## Provider selection
        Without a `provider` field, the call fans out across every provider
        AnswerThePublic supports (`gweb`, `youtube`, `bing`, `amazon`,
        `tiktok`, `instagram`, `chatgpt`, `gemini`). Pass `provider` to
        narrow the request to a single one — useful when polling rounds
        cost something on your side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - search
              properties:
                search:
                  type: object
                  required:
                    - keyword
                    - language
                    - region
                  properties:
                    keyword:
                      type: string
                      example: marketing automation
                      description: The query to research. Whitespace is trimmed and case is folded
                        server-side.
                    language:
                      type: string
                      example: en
                      description: ISO 639-1 language code. Coerced to `en` for Instagram
                        (English-only). Required so autocomplete locale matches
                        your audience.
                    region:
                      type: string
                      example: us
                      description: ISO 3166-1 alpha-2 region code. Coerced to `us` for TikTok and
                        Instagram, which only honour the global feed.
                    provider:
                      type: string
                      nullable: true
                      description: |-
                        Optional. Restrict the call to a single provider —
                        one of `gweb`, `youtube`, `bing`, `amazon`, `tiktok`,
                        `instagram`, `chatgpt`, `gemini`. Omit (or pass
                        `null`) to fan out across every provider.
      responses:
        "201":
          description: |-
            Search created (or an existing one within the dedupe window was
            reused). The body carries the parent search id and a per-provider
            `searches` array; inspect each entry's `status` to know whether
            its snapshot is ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/ParentSearch"
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |-
            One of: token missing the `searches:write` scope; workspace plan
            does not include API access; workspace API kill switch is off;
            or the workspace's monthly search allowance is exhausted.
            `error.message` distinguishes between them.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |-
            Request body failed validation — typically a missing or empty
            `keyword`, an unsupported `language`/`region`, or an unknown
            `provider`. `error.details` lists offending fields by name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/searches/{id}:
    get:
      tags:
        - Searches
      summary: Retrieve a single search and its latest snapshot
      description: |-
        Returns one provider-specific search and its most recent snapshot.
        Use this endpoint to:

        - **Poll for completion** after creating a search asynchronously —
          loop until `data.status` is `completed`, then read `data.snapshot`.
        - **Re-fetch** an old search for a refreshed view of its snapshot.

        The response always includes the search row, even when the snapshot
        is still loading. Inspect `data.status`:

        - `loading` — keyword pipeline (suggestions, AI prompts, CPC) is
          still running. Poll again shortly; one second between calls is
          plenty.
        - `completed` — snapshot is fully populated. `data.snapshot` is
          safe to render.
        - `failed` — the snapshot timed out. AnswerThePublic considers a
          snapshot failed if it has been loading longer than the configured
          ceiling (defaults to a few minutes). Re-create the search to
          retry.

        **Required scope:** `searches:read`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Search identifier returned by `POST /api/public/v1/searches` (one
            per provider) or by `GET /api/public/v1/searches`.
      responses:
        "200":
          description: |-
            Search retrieved. Always includes the search row; the `snapshot`
            field is populated only when `status` is `completed`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      search:
                        $ref: "#/components/schemas/Search"
                      snapshot:
                        type: object
                        nullable: true
                        description: Inlined snapshot payload. `null` while the search is still loading
                          or has failed.
                      status:
                        type: string
                        enum:
                          - loading
                          - completed
                          - failed
                        description: |-
                          Status of the search's latest snapshot. Drives
                          whether `snapshot` is populated and tells the
                          client whether to poll again.
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Token does not carry the `searches:read` scope, or the workspace
            cannot use the API (plan / kill switch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No search with this id exists in the token's workspace. Either the
            id is wrong, or the search belongs to a different workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/reports/{id}:
    get:
      tags:
        - Reports
      summary: Retrieve report payload for a parent search
      description: |-
        Returns the structured report payload for a parent search — the same
        data the AnswerThePublic dashboard renders as questions wheels,
        prepositions, comparisons, alphabeticals, related, and source
        breakdowns. The shape is the union of every provider's output;
        unused fields are omitted on a per-provider basis.

        Pass an `id` returned by `POST /api/public/v1/searches`
        (the parent search id) or one of the per-provider ids — both work.
        Use the query parameters to:

        - **Filter** by provider, source, category, intent, or sentiment to
          drill into a slice of the data.
        - **Sort** with `sort_by` + `sort_order` to surface highest-volume
          or lowest-cost keywords first.
        - **Range** with `range_start_volume`/`range_end_volume` and
          `range_start_cost`/`range_end_cost` to clip outliers.
        - **Paginate** with `page` and `per_page` for very wide reports.

        This endpoint is read-only and does **not** consume credits — call
        it as often as you like.

        **Required scope:** `reports:read`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Parent search id (or a per-provider search id) to fetch the report
            for.
        - in: query
          name: providers
          schema:
            type: string
          description: Comma-separated list of providers to include — e.g. `gweb,youtube`.
            Omit to include every provider.
        - in: query
          name: grouped
          schema:
            type: boolean
          description: When `true`, results are grouped by category/source the same way
            the dashboard renders them. When `false`, returns a flat list.
        - in: query
          name: source_name
          schema:
            type: string
          description: Restrict to a single source bucket (e.g. `questions`,
            `prepositions`, `comparisons`, `alphabeticals`).
        - in: query
          name: category
          schema:
            type: string
          description: Restrict to a single sub-category — typically the question word for
            `questions` source (`who`, `what`, `where`, `when`, `why`, `how`,
            `which`, `are`, `can`, `do`, `is`, `will`).
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 1-indexed page number for the keywords list.
        - in: query
          name: per_page
          schema:
            type: integer
            default: 100
          description: Number of keywords per page. Defaults to 100; raise it to reduce
            round-trips on very large reports.
        - in: query
          name: sort_by
          schema:
            type: string
          description: Field to sort by — typically `volume`, `cost_per_click`, or
            `keyword`.
        - in: query
          name: sort_order
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Direction for `sort_by`. Defaults to `desc` for numeric fields.
        - in: query
          name: range_start_volume
          schema:
            type: number
          description: Inclusive lower bound on monthly search volume. Use with
            `range_end_volume` to clip the keyword list.
        - in: query
          name: range_end_volume
          schema:
            type: number
          description: Inclusive upper bound on monthly search volume.
        - in: query
          name: range_start_cost
          schema:
            type: number
          description: Inclusive lower bound on cost-per-click.
        - in: query
          name: range_end_cost
          schema:
            type: number
          description: Inclusive upper bound on cost-per-click.
        - in: query
          name: search_string
          schema:
            type: string
          description: Case-insensitive substring filter applied to the keyword text.
        - in: query
          name: intents
          schema:
            type: string
          description: Comma-separated list of intent labels to include — e.g.
            `informational,transactional`.
        - in: query
          name: sentiments
          schema:
            type: string
          description: Comma-separated list of sentiment labels to include — e.g.
            `positive,neutral`.
      responses:
        "200":
          description: |-
            Report retrieved. The `data` object's exact shape varies by
            provider mix and `grouped` flag, but always carries the keyword
            rows along with their volume, cost, intent, and sentiment fields
            where the provider supports them.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    description: Report payload — keyword rows plus the same metadata the dashboard
                      renders. Shape mirrors the internal `/api/v1` reports
                      endpoint.
                    additionalProperties: true
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Token does not carry the `reports:read` scope, or the workspace
            cannot use the API (plan / kill switch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No parent search (or per-provider search) with this id exists in
            the token's workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/reports/{id}/ai/prompts:
    post:
      tags:
        - AI
      summary: Generate (or list) AI prompts for a report
      description: |-
        Returns the AI prompts attached to a single ChatGPT or Gemini
        report, paginated. Prompts are the questions surfaced for the
        report — both pre-built ones and any user-generated entries.

        ## Why `POST` for a "list" call
        The first time this endpoint is hit for a report, the underlying
        service **generates** the prompts on demand — they are not
        pre-computed rows that already live in the database. Subsequent
        calls return the same prompts from storage and behave like a
        normal listing. We use `POST` so callers know the request is
        non-idempotent and can mutate workspace data the first time
        through.

        ## Credit consumption
        Generating prompts consumes the workspace's plan allowance —
        the same allowance ChatGPT / Gemini searches draw from. When
        the workspace exceeds its allowance the service raises
        `PromptLimitReached` and the endpoint returns
        `403 Forbidden` with `message: "Prompt limit reached"`. Reads
        against an already-populated report do not charge again.

        **Required scope:** `ai:read`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Any of three identifiers the workspace owns: a Report (snapshot) id,
            a

            ParentSearch id, or a Search id. The endpoint resolves to the latest

            chatgpt/gemini snapshot under whichever you supply. Same id you'd
            pass

            to `GET /reports/{id}` works here — no need to learn a separate
            "snapshot

            id" concept just for the AI subroutes.
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 1-indexed page number to retrieve.
        - in: query
          name: intents
          schema:
            type: string
          description: |-
            Optional comma-separated list of intent labels to include, e.g.
            `informational,transactional`. Same format as the `intents` filter
            on `GET /reports/{id}` — no array/repeated-param style is supported.
      responses:
        "200":
          description: Prompts retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      prompts:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      page_info:
                        type: object
                        properties:
                          page:
                            type: integer
                          per_page:
                            type: integer
                          total_pages:
                            type: integer
                          next_page:
                            type: integer
                            nullable: true
                          previous_page:
                            type: integer
                            nullable: true
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |-
            Either the token does not carry `ai:read`, the workspace cannot
            use the API (plan / kill switch), or the prompt limit for the
            report has been reached (message: `Prompt limit reached`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Report id does not exist in the token's workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/reports/{id}/ai/answer_request:
    post:
      tags:
        - AI
      summary: Request an AI answer for a prompt (consumes credits)
      description: |-
        Enqueues a generation job for the given prompt and returns a
        `task_id` your client polls via
        `POST /api/public/v1/reports/{id}/ai/answer`. This is the only
        credit-consuming AI endpoint — every successful call charges the
        workspace's plan allowance.

        **Required scope:** `ai:write`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Any of three identifiers the workspace owns: a Report (snapshot) id,
            a

            ParentSearch id, or a Search id. The endpoint resolves to the latest

            chatgpt/gemini snapshot under whichever you supply. Same id you'd
            pass

            to `GET /reports/{id}` works here — no need to learn a separate
            "snapshot

            id" concept just for the AI subroutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ai_prompt_id
              properties:
                ai_prompt_id:
                  type: string
                  format: uuid
                  description: Identifier of the prompt the model should answer.
      responses:
        "200":
          description: Job enqueued. Hold the `task_id` and poll the answer endpoint.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |-
            Either the token does not carry `ai:write`, the workspace cannot
            use the API, or the workspace has hit the per-period AI answer
            limit (message: `Answer limit reached`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Report id does not exist in the token's workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/public/v1/reports/{id}/ai/answer:
    post:
      tags:
        - AI
      summary: Poll for an AI answer by task id
      description: |-
        Looks up the AI answer associated with the given `task_id`. While
        the model is still working, the response carries `status: processing`
        and no `ai_answer` payload. Once the underlying job finishes, the
        same call returns `status: completed` with the inlined answer.

        The `task_id` must belong to one of **this** report's prompts —
        a `task_id` from a different report (whether in the same workspace
        or another) returns `404`. Track the `task_id` you received from
        `POST /reports/{id}/ai/answer_request` and always poll it against
        the same report id you used to create it.

        Reads only — does not consume credits. **Required scope:** `ai:read`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: |-
            Same id family as the prompts endpoint — Report (snapshot) id,
            ParentSearch id, or Search id, all workspace-owned. Poll against the
            exact id you used to call `answer_request`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
              properties:
                task_id:
                  type: string
                  description: Identifier returned by `POST /reports/{id}/ai/answer_request`.
      responses:
        "200":
          description: Either the polling status (`processing`) or the completed answer.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - processing
                          - completed
                      ai_answer:
                        type: object
                        nullable: true
                        additionalProperties: true
                        description: Present when `status` is `completed`. Shape mirrors
                          `AiAnswerSerializer` from the internal API.
        "401":
          description: Token missing, malformed, revoked, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Token does not carry `ai:read`, or the workspace cannot use the API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: |-
            The report id is not in the token's workspace, or the `task_id`
            does not belong to one of *this* report's prompts (cross-report
            task_ids are rejected, not redirected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: The underlying generation job failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
